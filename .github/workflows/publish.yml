name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify package contents
        run: |
          test -f package.json
          test -f README.md
          test -f LICENSE
          test -f dist/index.js
          node -e "const pkg=require('./package.json'); if (!pkg.bin || !pkg.bin['tessera-mcp']) throw new Error('Missing tessera-mcp bin');"

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Validate npm package tarball
        run: npm pack --dry-run

      - name: Check npm package status
        id: npm_package
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${PACKAGE_NAME}@${PACKAGE_VERSION} is already published, so npm publish will be skipped."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check npm publish credentials
        id: npm_auth
        shell: bash
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "can_publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NPM_TOKEN is not configured, so npm publish will be skipped."
            exit 0
          fi

          if npm whoami >/tmp/npm-whoami.log 2>&1; then
            echo "can_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NPM_TOKEN is configured, but npm rejected it. npm publish will be skipped."
            sed 's/^/::notice::/' /tmp/npm-whoami.log
          fi

      - name: Publish to npm
        id: npm_publish
        if: startsWith(github.ref, 'refs/tags/') && steps.npm_package.outputs.published != 'true' && steps.npm_auth.outputs.can_publish == 'true'
        continue-on-error: true
        run: npm publish --access public --provenance

      - name: Report npm publish failure
        if: steps.npm_publish.outcome == 'failure'
        run: echo "::notice::npm publish failed. Verify that NPM_TOKEN can publish this package scope and that the npm @usetessera scope exists."
